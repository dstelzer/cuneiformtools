<html>
	<head>
		<title>Cuneiform Painter ALPHA</title>
		<script language="javascript" type="text/javascript" src="victor.min.js"></script> <!-- https://github.com/maxkueng/victor -->
		<script language="javascript" type="text/javascript" src="cuneipaint.js"></script>
		<style>
			.flexcontainer{
				display: flex;
				flex-direction: row;
				flex-wrap: wrap;
			}
			input{
				margin: 3px;
			}
			#outputpanel{
				margin: 3px;
			}
		</style>
	</head>
	<body onload="setup();">
		<p class="flexcontainer">
			<input type="button" value="Stroke" onclick="btn_stroke();" />
			<input type="button" value="Double" onclick="btn_double();" />
			<input type="button" value="Hook" onclick="btn_hook();" />
			<input type="button" value="Divide" onclick="btn_divide();" />
			<input type="button" value="Delete" onclick="btn_delete();" />
			<input type="button" value="Clear" onclick="btn_clear();" />
			<input type="button" value="Parse" onclick="btn_submit();" />
			<input type="button" value="Search!" onclick="btn_search();" id="searchbutton" disabled />
			<span id="outputpanel"></span>
		</p>
		<p class="flexcontainer main">
		<canvas id="paintcanvas" width="300" height="300"
			style="border:1px solid black;"
			onmousedown="cvs_down(event);"
			onmouseup="cvs_up(event);"
			onmousemove="cvs_move(event);"
		></canvas>
		<iframe id="preview" width="300" height="300" src="/rendersign?code=0&format=svg&scale=160" onload="resize_preview();">
		</iframe>
		</p>
		
		<p>
		Site visits:
		<!-- Default Statcounter code for Cuneiform tools
			http://dstelzer.pythonanywhere.com -->
		<script type="text/javascript">
		var sc_project=12471737; 
		var sc_invisible=0; 
		var sc_security="eab5dafa"; 
		var sc_text=2; 
		var scJsHost = "https://";
		document.write("<sc"+"ript type='text/javascript' src='" +
		scJsHost+
		"statcounter.com/counter/counter.js'></"+"script>");
		</script>
		<noscript><div class="statcounter"><a title="Web Analytics"
		href="https://statcounter.com/" target="_blank"><img
		class="statcounter"
		src="https://c.statcounter.com/12471737/0/eab5dafa/0/"
		alt="Web Analytics"></a></div></noscript>
		<!-- End of Statcounter Code -->
		</p>
	</body>
</html>
