<html>
	<head>
		<title>Experiment Setup</title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	</head>
	<body>
		<h1>Experiment Setup</h1>
		<form action="/experiment/cover" method="get" accept-charset="utf-8">
			<label>Subject key: <input type="text" name="expkey" size="6" required /></label>
			<label>List key: <input type="text" name="list" size="2" required /></label>
			<label>System (Z or H): <input type="text" name="system" size="2" required /></label>
			<label>Starting index: <input type="text" name="index" size="2" value="0" required /></label>
			<input type="submit" value="Begin" />
		</form>
	</body>
</html>
